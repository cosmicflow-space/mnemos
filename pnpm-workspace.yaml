packages:
  - apps/*
  - packages/*
  - plugins/*

# Defense against compromised-release attacks: refuse to install packages
# published less than 48 hours ago (industry-standard supply-chain hardening).
minimumReleaseAge: 2880

# Packages allowed to run install scripts. pnpm v10+ requires explicit
# per-package boolean approval for security. Includes our direct deps with
# native compilation (better-sqlite3, sqlite-vec, sharp, node-llama-cpp)
# plus transitive deps that pnpm flagged (esbuild, protobufjs).
allowBuilds:
  better-sqlite3: true
  sqlite-vec: true
  node-llama-cpp: true
  sharp: true
  esbuild: true
  protobufjs: true
  # tesseract.js's only postinstall is `opencollective-postinstall` (a donation
  # nag, no native build) — intentionally skipped. OCR works fully without it.
  tesseract.js: false
