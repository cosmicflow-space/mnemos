<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 24 216 208" fill="none" role="img" aria-label="Mnemos">
  <title>Mnemos</title>
  <desc>Citation brackets surrounding a custom Greek mu glyph. Cyan brackets evoke retrieval; amber mu evokes memory.</desc>
  <!-- Left citation bracket -->
  <path d="M 88 44 L 40 44 L 40 212 L 88 212"
        stroke="#06b6d4" stroke-width="24"
        stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Right citation bracket -->
  <path d="M 168 44 L 216 44 L 216 212 L 168 212"
        stroke="#06b6d4" stroke-width="24"
        stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Custom mu glyph: left stem (with descender), bottom rail, right stem -->
  <path d="M 104 84 L 104 200"
        stroke="#f59e0b" stroke-width="22"
        stroke-linecap="square"/>
  <path d="M 104 172 L 152 172"
        stroke="#f59e0b" stroke-width="22"
        stroke-linecap="square"/>
  <path d="M 152 84 L 152 172"
        stroke="#f59e0b" stroke-width="22"
        stroke-linecap="square"/>
</svg>
