services:
  mnemos:
    image: ${MNEMOS_IMAGE:-mnemos:local}
    build: .
    container_name: mnemos
    ports:
      - "127.0.0.1:${MNEMOS_PORT:-3030}:3030"
    volumes:
      # State persisted on host
      - ${MNEMOS_STATE_DIR:-${HOME}/.mnemos}:/home/node-app/.mnemos
      # Paired folders mounted read-only into /folders
      # Add more bind mounts as you pair folders (or use absolute paths)
      - ${MNEMOS_FOLDERS:-./folders}:/folders:ro
    environment:
      MNEMOS_BIND: 0.0.0.0
      MNEMOS_PORT: 3030
      MNEMOS_STATE_DIR: /home/node-app/.mnemos
      MNEMOS_AUTH_TOKEN: ${MNEMOS_AUTH_TOKEN:-}
      MNEMOS_LOAD_SHELL_ENV: ${MNEMOS_LOAD_SHELL_ENV:-0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      TZ: ${MNEMOS_TZ:-UTC}
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      # Let bundled local-model providers reach host-side Ollama / LM Studio
      - "host.docker.internal:host-gateway"
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3030/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
